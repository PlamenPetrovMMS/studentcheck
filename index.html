<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Checking System</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="icon" href="images/new_main_logo.png" type="image/png">
    <!-- Reuse registration theme for consistent card/buttons layout -->
    <link rel="stylesheet" href="css/registration.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <button class="navbar-logo" type="button" aria-label="Home" onclick="handleLogoClick()">
        <img src="images/new_main_logo.png" alt="Home">
    </button>
    <div class="page-container">
        <main class="card" role="form" aria-labelledby="homeTitle">
            <div class="card-header">
                <h1 id="homeTitle" class="title">Log in</h1>
            </div>
            <form id="unifiedLoginForm" method="post" novalidate>
                <div class="card-section">
                    <div class="field">
                        <label for="loginIdentifier" id="identifierLabel">Email or Faculty Number</label>
                        <input type="text" id="loginIdentifier" name="loginIdentifier" placeholder="Enter email or faculty number" autocomplete="username" required>
                    </div>
                    <div class="field">
                        <label for="password" id="passwordLabel">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                            <button type="button" class="toggle-password" aria-label="Show password" aria-pressed="false">
                                <img src="icons/show.svg" alt="Show password" />
                            </button>
                        </div>
                    </div>
                    <p id="error-message" class="error" role="alert" aria-live="polite" style="display:none"></p>
                    <div class="actions">
                        <button type="submit" id="loginSubmitBtn" class="btn btn-primary">Log in</button>
                    </div>
                </div>
            </form>
            <p class="muted" id="registerPrompt">Don’t have an account? <a href="registration.html">Register here</a></p>
        </main>
    </div>
    
    <script src="javascript/shared.js"></script>
    <script type="module" src="javascript/index.js"></script>
</body>
</html>
