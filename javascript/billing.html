<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="billing_title">Billing</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/billing.css">
</head>
<body>
    <div class="page-container">
        <div class="card">
            <h1 class="card-title" data-i18n="billing_title">Billing</h1>
            <div id="billingError" class="error-message" style="display: none;"></div>
            
            <div class="billing-info">
                <div class="billing-row">
                    <span class="billing-label" data-i18n="billing_current_plan">Current plan</span>
                    <span id="billingPlan" class="billing-value">—</span>
                </div>
                <div class="billing-row">
                    <span class="billing-label" data-i18n="billing_subscription_status">Subscription status</span>
                    <span id="billingStatus" class="billing-value">—</span>
                </div>
                <div class="billing-row">
                    <span class="billing-label" data-i18n="billing_renews_on">Renews on</span>
                    <span id="billingRenewal" class="billing-value">—</span>
                </div>
            </div>

            <div class="card-actions">
                <button id="manageBillingBtn" class="btn btn-secondary" data-i18n="billing_manage">Manage billing</button>
                <button id="upgradeBillingBtn" class="btn btn-primary" data-i18n="billing_upgrade" data-price-id="YOUR_PRO_PRICE_ID" style="display: none;">Upgrade</button>
            </div>
        </div>
    </div>

    <script src="javascript/shared.js"></script>
    <script type="module" src="javascript/billing.js"></script>
</body>
</html>
